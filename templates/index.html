{% extends 'base.html' %}


{% block content %}


<div>
    {% if user.is_authenticated %}
    Hello, {{ request.user.username }}!
    <a href="{% url 'logout' %}">Logout</a>
    <a href="{% url 'password_change' %}">Change Password</a>
    {% else %}
    <a href="{% url 'login' %}">Login</a>
    Hello, {{ request.custom.full_name|default:'Guest' }}!
    {% endif %}
</div>


{% endblock %}
